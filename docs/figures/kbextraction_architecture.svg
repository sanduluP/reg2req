<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="660" viewBox="0 0 1120 660" font-family="'Helvetica Neue', Arial, sans-serif" role="img" aria-labelledby="figtitle figdesc">
  <title id="figtitle">KBExtraction system architecture</title>
  <desc id="figdesc">A human-in-the-loop pipeline ingests documents into a provenance-aware Neo4j knowledge graph, which feeds a cross-document comparison engine producing overlap, alignment, conflict, and ambiguity findings.</desc>

  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5b6675" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1120" height="660" fill="#ffffff"/>

  <text x="560" y="42" text-anchor="middle" font-size="24" font-weight="600" fill="#1f2733">Knowledge-graph extraction &amp; cross-document comparison</text>
  <text x="560" y="66" text-anchor="middle" font-size="13" fill="#5b6675">Human-in-the-loop pipeline · provenance-aware Neo4j graph · standards overlap, conflict and ambiguity analysis</text>

  <g id="input">
    <rect x="30" y="205" width="132" height="150" rx="10" fill="#e8f0f9" stroke="#3b6fb0" stroke-width="1.4"/>
    <rect x="62" y="232" width="46" height="58" rx="4" fill="#ffffff" stroke="#3b6fb0" stroke-width="1.4"/>
    <rect x="74" y="222" width="46" height="58" rx="4" fill="#ffffff" stroke="#3b6fb0" stroke-width="1.4"/>
    <line x1="84" y1="238" x2="110" y2="238" stroke="#3b6fb0" stroke-width="1.3"/>
    <line x1="84" y1="248" x2="110" y2="248" stroke="#3b6fb0" stroke-width="1.3"/>
    <line x1="84" y1="258" x2="104" y2="258" stroke="#3b6fb0" stroke-width="1.3"/>
    <text x="96" y="315" text-anchor="middle" font-size="13.5" font-weight="600" fill="#234a78">Documents</text>
    <text x="96" y="333" text-anchor="middle" font-size="11" fill="#5b6675">PDF · multi-doc</text>
  </g>
  <line x1="162" y1="280" x2="187" y2="280" stroke="#5b6675" stroke-width="1.6" marker-end="url(#ah)"/>

  <g id="ingestion">
    <rect x="190" y="100" width="370" height="410" rx="12" fill="#fbfcfe" stroke="#c9ced8" stroke-width="1.4"/>
    <text x="206" y="126" font-size="15" font-weight="600" fill="#1f2733">Ingestion pipeline</text>
    <text x="552" y="126" text-anchor="end" font-size="11" fill="#5b6675">human-in-the-loop</text>

    <g>
      <rect x="210" y="150" width="330" height="58" rx="8" fill="#e4f2f2" stroke="#2f8f8f" stroke-width="1.3"/>
      <circle cx="232" cy="173" r="7" fill="none" stroke="#1d5f5f" stroke-width="1.6"/>
      <line x1="237" y1="178" x2="243" y2="184" stroke="#1d5f5f" stroke-width="1.6" stroke-linecap="round"/>
      <text x="258" y="174" font-size="13.5" font-weight="600" fill="#1d5f5f">Parse &amp; gate</text>
      <text x="258" y="192" font-size="11" fill="#5b6675">Docling · KeyBERT (MiniLM-L6)</text>
    </g>
    <line x1="375" y1="208" x2="375" y2="221" stroke="#5b6675" stroke-width="1.6" marker-end="url(#ah)"/>

    <g>
      <rect x="210" y="222" width="330" height="58" rx="8" fill="#efeaf6" stroke="#7a5ea8" stroke-width="1.3"/>
      <rect x="224" y="239" width="20" height="20" rx="4" fill="none" stroke="#4a3a6b" stroke-width="1.6"/>
      <circle cx="234" cy="249" r="3" fill="#4a3a6b"/>
      <line x1="234" y1="235" x2="234" y2="239" stroke="#4a3a6b" stroke-width="1.4"/><line x1="234" y1="259" x2="234" y2="263" stroke="#4a3a6b" stroke-width="1.4"/>
      <line x1="220" y1="249" x2="224" y2="249" stroke="#4a3a6b" stroke-width="1.4"/><line x1="244" y1="249" x2="248" y2="249" stroke="#4a3a6b" stroke-width="1.4"/>
      <text x="258" y="246" font-size="13.5" font-weight="600" fill="#4a3a6b">Decompose</text>
      <text x="258" y="264" font-size="11" fill="#5b6675">LLM → atomic qualities</text>
    </g>
    <line x1="375" y1="280" x2="375" y2="293" stroke="#5b6675" stroke-width="1.6" marker-end="url(#ah)"/>

    <g>
      <rect x="210" y="294" width="330" height="58" rx="8" fill="#e4f2f2" stroke="#2f8f8f" stroke-width="1.3"/>
      <path d="M222 311 H246 L237 322 V331 H231 V322 Z" fill="none" stroke="#1d5f5f" stroke-width="1.6" stroke-linejoin="round"/>
      <text x="258" y="318" font-size="13.5" font-weight="600" fill="#1d5f5f">Filter &amp; novelty</text>
      <text x="258" y="336" font-size="11" fill="#5b6675">cosine (MiniLM) · LLM judge</text>
    </g>
    <line x1="375" y1="352" x2="375" y2="365" stroke="#5b6675" stroke-width="1.6" marker-end="url(#ah)"/>

    <g>
      <rect x="210" y="366" width="330" height="58" rx="8" fill="#efeaf6" stroke="#7a5ea8" stroke-width="1.3"/>
      <rect x="224" y="383" width="20" height="20" rx="4" fill="none" stroke="#4a3a6b" stroke-width="1.6"/>
      <circle cx="234" cy="393" r="3" fill="#4a3a6b"/>
      <line x1="234" y1="379" x2="234" y2="383" stroke="#4a3a6b" stroke-width="1.4"/><line x1="234" y1="403" x2="234" y2="407" stroke="#4a3a6b" stroke-width="1.4"/>
      <line x1="220" y1="393" x2="224" y2="393" stroke="#4a3a6b" stroke-width="1.4"/><line x1="244" y1="393" x2="248" y2="393" stroke="#4a3a6b" stroke-width="1.4"/>
      <text x="258" y="390" font-size="13.5" font-weight="600" fill="#4a3a6b">Extract triplets</text>
      <text x="258" y="408" font-size="11" fill="#5b6675">LLM · predicate + modality</text>
    </g>

    <g>
      <rect x="210" y="440" width="330" height="48" rx="8" fill="#faf0dd" stroke="#c98a2b" stroke-width="1.3"/>
      <circle cx="234" cy="458" r="6" fill="none" stroke="#7a5410" stroke-width="1.6"/>
      <path d="M224 474 a10 9 0 0 1 20 0" fill="none" stroke="#7a5410" stroke-width="1.6"/>
      <text x="258" y="463" font-size="12.5" font-weight="600" fill="#7a5410">Human review — qualities &amp; triplets</text>
    </g>
  </g>

  <g id="kg">
    <ellipse cx="645" cy="250" rx="55" ry="14" fill="#e6f3ea" stroke="#3f8f5b" stroke-width="1.4"/>
    <path d="M590 250 V350 a55 14 0 0 0 110 0 V250" fill="#e6f3ea" stroke="#3f8f5b" stroke-width="1.4"/>
    <ellipse cx="645" cy="250" rx="55" ry="14" fill="none" stroke="#3f8f5b" stroke-width="1.4"/>
    <path d="M590 290 a55 14 0 0 0 110 0" fill="none" stroke="#3f8f5b" stroke-width="1"/>
    <path d="M590 320 a55 14 0 0 0 110 0" fill="none" stroke="#3f8f5b" stroke-width="1"/>
    <text x="645" y="378" text-anchor="middle" font-size="13.5" font-weight="600" fill="#235e38">Knowledge Graph</text>
    <text x="645" y="396" text-anchor="middle" font-size="11" fill="#5b6675">Neo4j · append-only provenance</text>
  </g>

  <line x1="540" y1="395" x2="592" y2="345" stroke="#5b6675" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="556" y="378" font-size="10.5" fill="#5b6675">write</text>
  <line x1="588" y1="296" x2="542" y2="320" stroke="#9aa3b2" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ah)"/>
  <text x="548" y="300" font-size="10.5" fill="#9aa3b2">read</text>

  <line x1="700" y1="300" x2="738" y2="300" stroke="#5b6675" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="719" y="293" text-anchor="middle" font-size="10.5" fill="#5b6675">provenance</text>

  <g id="comparison">
    <rect x="740" y="100" width="350" height="410" rx="12" fill="#fbfcfe" stroke="#c9ced8" stroke-width="1.4"/>
    <text x="756" y="126" font-size="15" font-weight="600" fill="#1f2733">Cross-document comparison</text>

    <g>
      <rect x="755" y="150" width="160" height="68" rx="8" fill="#eaeef6" stroke="#4a5d8a" stroke-width="1.3"/>
      <circle cx="781" cy="178" r="10" fill="none" stroke="#2c3a5e" stroke-width="1.5"/>
      <circle cx="793" cy="178" r="10" fill="none" stroke="#2c3a5e" stroke-width="1.5"/>
      <text x="772" y="203" font-size="12.5" font-weight="600" fill="#2c3a5e">Overlap</text>
      <text x="772" y="217" font-size="10.5" fill="#5b6675">coverage matrix</text>
    </g>
    <g>
      <rect x="925" y="150" width="150" height="68" rx="8" fill="#eaeef6" stroke="#4a5d8a" stroke-width="1.3"/>
      <text x="940" y="184" font-size="12.5" font-weight="600" fill="#2c3a5e">Alignment</text>
      <text x="940" y="200" font-size="10.5" fill="#5b6675">SAME_AS concepts</text>
    </g>
    <g>
      <rect x="755" y="232" width="160" height="68" rx="8" fill="#eaeef6" stroke="#4a5d8a" stroke-width="1.3"/>
      <text x="770" y="266" font-size="12.5" font-weight="600" fill="#2c3a5e">Conflicts</text>
      <text x="770" y="282" font-size="10.5" fill="#5b6675">candidates + LLM judge</text>
    </g>
    <g>
      <rect x="925" y="232" width="150" height="68" rx="8" fill="#eaeef6" stroke="#4a5d8a" stroke-width="1.3"/>
      <text x="940" y="266" font-size="12.5" font-weight="600" fill="#2c3a5e">Ambiguity</text>
      <text x="940" y="282" font-size="10.5" fill="#5b6675">undefined · vague terms</text>
    </g>

    <g>
      <rect x="755" y="314" width="320" height="44" rx="8" fill="#faf0dd" stroke="#c98a2b" stroke-width="1.3"/>
      <circle cx="779" cy="334" r="6" fill="none" stroke="#7a5410" stroke-width="1.6"/>
      <path d="M769 350 a10 9 0 0 1 20 0" fill="none" stroke="#7a5410" stroke-width="1.6"/>
      <text x="803" y="339" font-size="12.5" font-weight="600" fill="#7a5410">Reviewer confirms findings</text>
    </g>
    <g>
      <rect x="755" y="368" width="320" height="44" rx="8" fill="#e8f0f9" stroke="#3b6fb0" stroke-width="1.3"/>
      <text x="772" y="394" font-size="12.5" font-weight="600" fill="#234a78">Compare UI · xlsx export</text>
    </g>
  </g>

  <g id="legend">
    <rect x="30" y="560" width="14" height="14" rx="3" fill="#e4f2f2" stroke="#2f8f8f"/>
    <text x="50" y="571" font-size="11" fill="#5b6675">Compute / embed</text>
    <rect x="180" y="560" width="14" height="14" rx="3" fill="#efeaf6" stroke="#7a5ea8"/>
    <text x="200" y="571" font-size="11" fill="#5b6675">LLM</text>
    <rect x="250" y="560" width="14" height="14" rx="3" fill="#faf0dd" stroke="#c98a2b"/>
    <text x="270" y="571" font-size="11" fill="#5b6675">Human gate</text>
    <rect x="360" y="560" width="14" height="14" rx="3" fill="#e6f3ea" stroke="#3f8f5b"/>
    <text x="380" y="571" font-size="11" fill="#5b6675">Storage (Neo4j)</text>
    <rect x="490" y="560" width="14" height="14" rx="3" fill="#e8f0f9" stroke="#3b6fb0"/>
    <text x="510" y="571" font-size="11" fill="#5b6675">Input / output</text>
    <rect x="615" y="560" width="14" height="14" rx="3" fill="#eaeef6" stroke="#4a5d8a"/>
    <text x="635" y="571" font-size="11" fill="#5b6675">Analysis</text>
  </g>

  <text x="30" y="606" font-size="11" fill="#5b6675">Models — LLM: deepseek-r1:32b (swappable) · Embeddings: sentence-transformers/all-MiniLM-L6-v2 (384-d) · Parser: Docling · Store: Neo4j</text>
  <text x="560" y="640" text-anchor="middle" font-size="12" font-style="italic" fill="#1f2733">Figure 1. System architecture of the human-in-the-loop knowledge-graph extraction and comparison pipeline.</text>
</svg>
