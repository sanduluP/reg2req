<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" ry="7" fill="#0d6efd"/>
  <!-- Knowledge graph: 3 nodes connected in a triangle -->
  <!-- Edges first so nodes render on top -->
  <line x1="16" y1="7" x2="7" y2="23" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>
  <line x1="16" y1="7" x2="25" y2="23" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>
  <line x1="7"  y1="23" x2="25" y2="23" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>
  <!-- Top node (hub) -->
  <circle cx="16" cy="7"  r="3.5" fill="white"/>
  <!-- Bottom-left node -->
  <circle cx="7"  cy="23" r="2.8" fill="white" opacity="0.9"/>
  <!-- Bottom-right node -->
  <circle cx="25" cy="23" r="2.8" fill="white" opacity="0.9"/>
  <!-- Small dot in center to hint "graph density" -->
  <circle cx="16" cy="17" r="1.5" fill="white" opacity="0.5"/>
</svg>
